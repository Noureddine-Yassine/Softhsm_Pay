<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>PayHSM — Generateur DOCX</title>
<script src="https://unpkg.com/docx@8.5.0/build/index.js"></script>
<style>
  body { font-family: Arial, sans-serif; background: #1a3a5c; color: white;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; margin: 0; }
  .box { background: #fff; color: #333; border-radius: 12px; padding: 40px 50px;
         text-align: center; max-width: 520px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  h1 { color: #154360; font-size: 2em; margin: 0 0 8px; }
  .sub { color: #2980b9; font-style: italic; margin: 0 0 24px; }
  #btn { background: #2980b9; color: white; border: none; border-radius: 8px;
         padding: 14px 32px; font-size: 1.1em; cursor: pointer; transition: background .2s; }
  #btn:hover { background: #154360; }
  #btn:disabled { background: #aaa; cursor: default; }
  #status { margin-top: 20px; font-size: .95em; color: #555; min-height: 24px; }
  .ok { color: #27ae60 !important; font-weight: bold; }
  .err { color: #c0392b !important; }
</style>
</head>
<body>
<div class="box">
  <h1>PAYHSM</h1>
  <p class="sub">Soft HSM pour Paiements Securises — PFE 2026</p>
  <p>Cliquez pour generer et telecharger le rapport Word complet<br>
     (besoins fonctionnels, non fonctionnels, architecture, 9 diagrammes UML)</p>
  <button id="btn" onclick="generate()">Generer le DOCX</button>
  <div id="status">Pret.</div>
</div>

<script>
function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = cls || '';
}

async function generate() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  setStatus('Generation en cours...');

  try {
    const {
      Document, Packer, Paragraph, TextRun, Table, TableRow, TableCell,
      AlignmentType, HeadingLevel, BorderStyle, WidthType, ShadingType,
      Header, Footer, PageNumber, PageBreak, LevelFormat
    } = docx;

    const DARK_BLUE  = "154360";
    const ACCENT     = "2980B9";
    const LIGHT_BLUE = "D6EAF8";
    const LIGHT_GREY = "F2F3F4";
    const WHITE      = "FFFFFF";

    const cb = { style: BorderStyle.SINGLE, size: 1, color: "AAAAAA" };
    const borders = { top: cb, bottom: cb, left: cb, right: cb };

    function h1(text) {
      return new Paragraph({
        heading: HeadingLevel.HEADING_1,
        children: [new TextRun({ text, bold:true, font:"Arial", size:32, color:DARK_BLUE })],
        spacing: { before:400, after:200 },
        border: { bottom:{ style:BorderStyle.SINGLE, size:8, color:ACCENT, space:1 } },
      });
    }
    function h2(text) {
      return new Paragraph({
        heading: HeadingLevel.HEADING_2,
        children: [new TextRun({ text, bold:true, font:"Arial", size:26, color:DARK_BLUE })],
        spacing: { before:280, after:140 },
      });
    }
    function h3(text) {
      return new Paragraph({
        heading: HeadingLevel.HEADING_3,
        children: [new TextRun({ text, bold:true, font:"Arial", size:22, color:ACCENT })],
        spacing: { before:200, after:100 },
      });
    }
    function p(text) {
      return new Paragraph({
        children: [new TextRun({ text, font:"Arial", size:22 })],
        spacing: { before:80, after:80 },
      });
    }
    function bp(text) {
      return new Paragraph({
        numbering: { reference:"bul", level:0 },
        children: [new TextRun({ text, font:"Arial", size:22 })],
        spacing: { before:60, after:60 },
      });
    }
    function note(text) {
      return new Paragraph({
        children: [new TextRun({ text:"Note : "+text, font:"Arial", size:20, italics:true, color:"555555" })],
        indent: { left:360 },
        spacing: { before:60, after:60 },
      });
    }
    function br() { return new Paragraph({ children:[new PageBreak()] }); }

    function row(cells, isHdr=false) {
      return new TableRow({
        tableHeader: isHdr,
        children: cells.map(c => new TableCell({
          borders,
          width: { size:c.w||2000, type:WidthType.DXA },
          shading: c.bg ? { fill:c.bg, type:ShadingType.CLEAR } : undefined,
          margins: { top:80, bottom:80, left:120, right:120 },
          children: [new Paragraph({
            children: [new TextRun({
              text: c.t||"", font:"Arial", size:20,
              bold: c.bold||isHdr, color: isHdr ? WHITE : undefined,
            })],
          })],
        })),
      });
    }
    function tbl(colWidths, rows) {
      return new Table({
        width: { size:colWidths.reduce((a,b)=>a+b,0), type:WidthType.DXA },
        columnWidths: colWidths, rows,
      });
    }

    const A4_W=11906, A4_H=16838, M=1440;
    const PAGE = { size:{ width:A4_W, height:A4_H }, margin:{ top:M, right:M, bottom:M, left:M } };

    const HDR = new Header({ children:[new Paragraph({
      children:[new TextRun({ text:"PayHSM — Analyse de Conception | PFE 2026", font:"Arial", size:18, color:"888888" })],
      border:{ bottom:{ style:BorderStyle.SINGLE, size:2, color:"CCCCCC", space:1 } },
    })]});
    const FTR = new Footer({ children:[new Paragraph({
      children:[
        new TextRun({ text:"PayHSM PFE 2026 | Page ", font:"Arial", size:18, color:"888888" }),
        new TextRun({ children:[PageNumber.CURRENT], font:"Arial", size:18, color:"888888" }),
      ],
      alignment: AlignmentType.CENTER,
      border:{ top:{ style:BorderStyle.SINGLE, size:2, color:"CCCCCC", space:1 } },
    })]});

    setStatus('Construction des sections...');

    const document = new Document({
      numbering: { config:[{ reference:"bul", levels:[{
        level:0, format:LevelFormat.BULLET, text:"•", alignment:AlignmentType.LEFT,
        style:{ paragraph:{ indent:{ left:720, hanging:360 } } },
      }]}]},
      styles: {
        default: { document:{ run:{ font:"Arial", size:22 } } },
        paragraphStyles:[
          { id:"Heading1", name:"Heading 1", basedOn:"Normal", next:"Normal", quickFormat:true,
            run:{ size:32, bold:true, font:"Arial", color:DARK_BLUE },
            paragraph:{ spacing:{ before:400, after:200 }, outlineLevel:0 } },
          { id:"Heading2", name:"Heading 2", basedOn:"Normal", next:"Normal", quickFormat:true,
            run:{ size:26, bold:true, font:"Arial", color:DARK_BLUE },
            paragraph:{ spacing:{ before:280, after:140 }, outlineLevel:1 } },
          { id:"Heading3", name:"Heading 3", basedOn:"Normal", next:"Normal", quickFormat:true,
            run:{ size:22, bold:true, font:"Arial", color:ACCENT },
            paragraph:{ spacing:{ before:200, after:100 }, outlineLevel:2 } },
        ],
      },
      sections:[
        // ── PAGE DE TITRE ──────────────────────────────────────
        {
          properties:{ page:PAGE },
          children:[
            new Paragraph({ spacing:{before:2800,after:0}, children:[] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:200},
              children:[new TextRun({text:"PAYHSM",font:"Arial",size:80,bold:true,color:DARK_BLUE})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:500},
              children:[new TextRun({text:"Soft HSM pour Paiements Securises",font:"Arial",size:36,color:ACCENT,italics:true})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:160},
              border:{ top:{style:BorderStyle.SINGLE,size:4,color:ACCENT,space:1} }, children:[] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:160,after:100},
              children:[new TextRun({text:"Analyse de Conception et Diagrammes UML",font:"Arial",size:28,bold:true})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:800},
              children:[new TextRun({text:"Projet de Fin d'Etudes (PFE) — Architecture Securisee",font:"Arial",size:22,italics:true,color:"666666"})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:80},
              children:[new TextRun({text:"Auteur : Yassine Nourdine",font:"Arial",size:24,bold:true})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:80},
              children:[new TextRun({text:"nourddineyassine2002@gmail.com",font:"Arial",size:20,color:"555555"})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:80},
              children:[new TextRun({text:"Mai 2026",font:"Arial",size:20,color:"555555"})] }),
            new Paragraph({ alignment:AlignmentType.CENTER, spacing:{before:0,after:80},
              children:[new TextRun({text:"https://github.com/Schaib03/payhsm",font:"Arial",size:20,color:ACCENT})] }),
            new Paragraph({ alignment:AlignmentType.CENTER,
              children:[new TextRun({text:"Ubuntu 24.04 | OpenSSL 3.x | GCC | SoftHSMv2",font:"Arial",size:18,color:"888888"})] }),
          ],
        },

        // ── CORPS ──────────────────────────────────────────────
        {
          properties:{ page:PAGE },
          headers:{ default:HDR },
          footers:{ default:FTR },
          children:[

            // ── 1. INTRODUCTION ──────────────────────────────────
            h1("1. Introduction et Contexte du Projet"),
            p("PayHSM est un projet PFE concevant un module de securite materiel logiciel (Soft HSM) dedie aux paiements electroniques securises. Il s'appuie sur SoftHSMv2 comme socle PKCS#11 et y greffe trois couches de securite originales : defense systeme, gestionnaire de cles fragmentees, et primitives cryptographiques conformes aux normes ISO 9564, ISO 9797-1 et EMV Book 2."),
            p("Problematique : garantir la confidentialite de la LMK et la securite des operations de paiement (PIN, MAC, EMV) dans un environnement logiciel, sans puce HSM physique, sous Linux."),
            h2("1.1 Perimetre de l'Analyse"),
            p("Analyse exclusive des modules PayHSM originaux (src/lib/payhsm/). SoftHSMv2 est le socle PKCS#11 mais n'est pas analyse ici. L'integration s'effectue via SecureDataManager.cpp et SoftHSM.cpp (modules modifies)."),
            h2("1.2 Structure des Sources"),
            tbl([2000,2400,4626],[
              row([{t:"Repertoire",w:2000,bg:DARK_BLUE},{t:"Fichiers cles",w:2400,bg:DARK_BLUE},{t:"Role",w:4626,bg:DARK_BLUE}],true),
              row([{t:"defense/",w:2000},{t:"defense.c, seccomp_policy.c",w:2400},{t:"Anti-dump, anti-ptrace, secure_zero, filtre BPF syscalls",w:4626}]),
              row([{t:"keymanager/",w:2000,bg:LIGHT_GREY},{t:"xor_fragment.c, lmk_store.c, kek_provider.c, key_vault.c, integrity.c, mutation.c",w:2400,bg:LIGHT_GREY},{t:"Fragmentation LMK P1/P2/P3, AES-256-GCM, coffre cles",w:4626,bg:LIGHT_GREY}]),
              row([{t:"payment/",w:2000},{t:"pin.c, mac.c, emv.c, key_exchange.c, pkcs11_payment.cpp",w:2400},{t:"PIN Block ISO 9564, MAC ISO 9797-1, EMV Book 2, ABI C PKCS#11",w:4626}]),
              row([{t:"payhsm_core.c/h",w:2000,bg:LIGHT_GREY},{t:"payhsm_core.c, payhsm.h",w:2400,bg:LIGHT_GREY},{t:"Coeur HSM : provision, startup, operations bancaires",w:4626,bg:LIGHT_GREY}]),
              row([{t:"payhsm_switch.c/h",w:2000},{t:"payhsm_switch.c/h",w:2400},{t:"Interface Switch inter-bancaire (GCM 88 hex / ECB 32 hex)",w:4626}]),
              row([{t:"bin/",w:2000,bg:LIGHT_GREY},{t:"payhsm-cli.c, payhsmd.c, payhsm-httpd.c",w:2400,bg:LIGHT_GREY},{t:"CLI, daemon Unix socket, serveur HTTP REST",w:4626,bg:LIGHT_GREY}]),
              row([{t:"tests/",w:2000},{t:"test_scenarios.c, test_emv_switch.c, test_complet.c",w:2400},{t:"Tests d'integration : PIN, MAC, EMV, switch, mutation",w:4626}]),
            ]),
            br(),

            // ── 2. BESOINS FONCTIONNELS ─────────────────────────
            h1("2. Besoins Fonctionnels"),

            h2("2.1 Gestion du Cycle de Vie du HSM (FR1)"),
            tbl([1000,2300,5726],[
              row([{t:"ID",w:1000,bg:DARK_BLUE},{t:"Intitule",w:2300,bg:DARK_BLUE},{t:"Description",w:5726,bg:DARK_BLUE}],true),
              row([{t:"FR1.1",w:1000},{t:"Provisionnement HSM",w:2300},{t:"Generer LMK 256 bits (RAND_bytes), deriver TMK/TPK/TAK par terminal, initialiser le coffre chiffre. Passphrase requise.",w:5726}]),
              row([{t:"FR1.2",w:1000,bg:LIGHT_GREY},{t:"Provisionnement LMK seule",w:2300,bg:LIGHT_GREY},{t:"Seule la LMK est generee. Les cles metier restent chez le Switch (payhsm_provision_lmk_only).",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR1.3",w:1000},{t:"Demarrage securise",w:2300},{t:"Charger LMK chiffree, KEK via PBKDF2-SHA256 (100k), AES-256-GCM dechiffrement, fragmenter P1/P2/P3, effacer LMK. Defenses armees en premier.",w:5726}]),
              row([{t:"FR1.4",w:1000,bg:LIGHT_GREY},{t:"Arret propre",w:2300,bg:LIGHT_GREY},{t:"zero_all_fragments() + secure_zero() sur tous les buffers secrets avant terminaison.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR1.5",w:1000},{t:"Identifiant de boot",w:2300},{t:"boot_id incremental pour synchroniser l'etat HSM-Switch apres chaque redemarrage.",w:5726}]),
            ]),

            h2("2.2 Gestion des Cles (FR2)"),
            tbl([1000,2300,5726],[
              row([{t:"ID",w:1000,bg:DARK_BLUE},{t:"Intitule",w:2300,bg:DARK_BLUE},{t:"Description",w:5726,bg:DARK_BLUE}],true),
              row([{t:"FR2.1",w:1000},{t:"Fragmentation LMK",w:2300},{t:"P1 (BSS) XOR P2 (heap) XOR P3 (DATA) = LMK. Invariant maintenu en permanence. LMK effacee apres fragmentation.",w:5726}]),
              row([{t:"FR2.2",w:1000,bg:LIGHT_GREY},{t:"Persistance (AES-256-GCM)",w:2300,bg:LIGHT_GREY},{t:"lmk.bin : sel(16) | nonce(12) | tag(16) | CT(32). Tag = integrite. AES-ECB interdit pour la LMK.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR2.3",w:1000},{t:"Derivation KEK (PBKDF2)",w:2300},{t:"KEK = PBKDF2-SHA256(passphrase, sel, 100 000 iterations). Resistance aux attaques dictionnaire.",w:5726}]),
              row([{t:"FR2.4",w:1000,bg:LIGHT_GREY},{t:"Coffre (KeyVault)",w:2300,bg:LIGHT_GREY},{t:"32 entrees typees (LMK/TMK/TPK/TAK/ZMK/ZPK/PVK/IMK). Chaque cle chiffree sous LMK + KCV 3 octets.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR2.5",w:1000},{t:"Verification integrite",w:2300},{t:"HMAC-SHA256 de reference a la fragmentation. Verifie avant chaque recompose_for_op(). Echec = emergency_shutdown().",w:5726}]),
              row([{t:"FR2.6",w:1000,bg:LIGHT_GREY},{t:"Mutation cyclique",w:2300,bg:LIGHT_GREY},{t:"XOR aleatoire P1/P3 + realloc heap P2. Tout snapshot memoire anterieur devient inutilisable.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR2.7",w:1000},{t:"Calcul KCV",w:2300},{t:"KCV = AES-ECB(key, 0x00...)[0:3] pour verification visuelle de toute cle du coffre.",w:5726}]),
            ]),

            h2("2.3 Traitement du PIN (FR3)"),
            tbl([1000,2300,5726],[
              row([{t:"ID",w:1000,bg:DARK_BLUE},{t:"Intitule",w:2300,bg:DARK_BLUE},{t:"Description",w:5726,bg:DARK_BLUE}],true),
              row([{t:"FR3.1",w:1000},{t:"Generation PIN Block",w:2300},{t:"PIN Block ISO 9564 Format 0 chiffre sous TPK (AES-128-ECB). Simulation GAP ou demo.",w:5726}]),
              row([{t:"FR3.2",w:1000,bg:LIGHT_GREY},{t:"Translation TPK -> ZPK",w:2300,bg:LIGHT_GREY},{t:"Dechiffre sous TPK, rechiffre sous ZPK. PIN jamais en clair hors buffers proteges.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR3.3",w:1000},{t:"Verification PIN (PVV VISA)",w:2300},{t:"PVV = decimalise(AES(PVK, PAN+PSN+PIN))[0:4]. Retourne 0 si valide, -1 sinon.",w:5726}]),
              row([{t:"FR3.4",w:1000,bg:LIGHT_GREY},{t:"Verification PIN Block chiffre",w:2300,bg:LIGHT_GREY},{t:"Dechiffre (TPK ou ZPK), calcule PVV, compare. PIN ne transite jamais en clair.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR3.5",w:1000},{t:"Translation ZPK -> ZPK",w:2300},{t:"Translation inter-bancaire entre deux ZPK pour routage reseau.",w:5726}]),
            ]),

            h2("2.4 Operations MAC (FR4)"),
            tbl([1000,2300,5726],[
              row([{t:"ID",w:1000,bg:DARK_BLUE},{t:"Intitule",w:2300,bg:DARK_BLUE},{t:"Description",w:5726,bg:DARK_BLUE}],true),
              row([{t:"FR4.1",w:1000},{t:"MAC Retail (TAK)",w:2300},{t:"MAC ISO 9797-1 Algorithme 3 (Retail MAC) sous TAK pour integrite des messages terminaux.",w:5726}]),
              row([{t:"FR4.2",w:1000,bg:LIGHT_GREY},{t:"MAC inter-bancaire (ZAK)",w:2300,bg:LIGHT_GREY},{t:"MAC sous ZAK pour messages de compensation inter-bancaires.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR4.3",w:1000},{t:"Verification temps constant",w:2300},{t:"Comparaison a temps constant — protection contre les attaques temporelles.",w:5726}]),
            ]),

            h2("2.5 Traitement EMV (FR5)"),
            tbl([1000,2300,5726],[
              row([{t:"ID",w:1000,bg:DARK_BLUE},{t:"Intitule",w:2300,bg:DARK_BLUE},{t:"Description",w:5726,bg:DARK_BLUE}],true),
              row([{t:"FR5.1",w:1000},{t:"Derivation MK-AC",w:2300},{t:"MK-AC = HMAC-SHA1(IMK, PAN||PSN)[0:16]. Methode A EMV Book 2.",w:5726}]),
              row([{t:"FR5.2",w:1000,bg:LIGHT_GREY},{t:"Derivation SK-AC",w:2300,bg:LIGHT_GREY},{t:"SK-AC = XOR(MK-AC, ATC padde). Unique par transaction.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR5.3",w:1000},{t:"Calcul ARQC",w:2300},{t:"ARQC = CMAC-AES(SK-AC, donnees_tx). Simule le cryptogramme puce EMV.",w:5726}]),
              row([{t:"FR5.4",w:1000,bg:LIGHT_GREY},{t:"Verification ARQC",w:2300,bg:LIGHT_GREY},{t:"Recalcule ARQC cote HSM emetteur, compare au cryptogramme recu.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR5.5",w:1000},{t:"Generation ARPC",w:2300},{t:"ARPC = CMAC(MK-AC, ARQC XOR ARC). Reponse d'autorisation a la puce.",w:5726}]),
              row([{t:"FR5.6",w:1000,bg:LIGHT_GREY},{t:"Verification ARPC (puce)",w:2300,bg:LIGHT_GREY},{t:"Verification ARPC cote puce — authentification mutuelle HSM-carte.",w:5726,bg:LIGHT_GREY}]),
              row([{t:"FR5.7",w:1000},{t:"Simulation achat EMV",w:2300},{t:"MK-AC -> donnees_tx -> SK-AC -> ARQC -> verify -> ARPC en un appel payhsm_emv_simulate_purchase().",w:5726}]),
            ]),

            h2("2.6 Gestion Cartes (FR6) et Interface Switch (FR7)"),
            bp("FR6.1 — Enregistrement carte : PAN + PIN -> PVV -> persistence cards.pvv"),
            bp("FR6.2 — Emission PVV Core Banking : payhsm_corebanking_issue_pvv()"),
            bp("FR6.3 — Lecture PVV : payhsm_corebanking_get_pvv() pour un PAN donne"),
            bp("FR7.1 — Dechiffrement cles Switch : GCM blob 88 hex ou ECB 32 hex"),
            bp("FR7.2 — Derivation terminaux Switch : TPK et TAK depuis TMK externe"),
            bp("FR7.3 — Toutes les operations PIN/MAC/EMV sans coffre local (mode Switch)"),

            h2("2.7 Couche de Defense Active (FR8)"),
            tbl([1000,2400,5626],[
              row([{t:"ID",w:1000,bg:DARK_BLUE},{t:"Mecanisme",w:2400,bg:DARK_BLUE},{t:"Detail",w:5626,bg:DARK_BLUE}],true),
              row([{t:"FR8.1",w:1000},{t:"Anti-dump (OS)",w:2400},{t:"setrlimit(RLIMIT_CORE,{0,0}) + mlockall(MCL_CURRENT|MCL_FUTURE) — pas de core dump, pas de swap.",w:5626}]),
              row([{t:"FR8.2",w:1000,bg:LIGHT_GREY},{t:"Anti-ptrace (debug)",w:2400,bg:LIGHT_GREY},{t:"prctl(PR_SET_DUMPABLE,0) + prctl(PR_SET_NO_NEW_PRIVS,1) — debugger bloque.",w:5626,bg:LIGHT_GREY}]),
              row([{t:"FR8.3",w:1000},{t:"Detection debugger active",w:2400},{t:"/proc/self/status -> TracerPid. Si != 0 : emergency_shutdown() immediate.",w:5626}]),
              row([{t:"FR8.4",w:1000,bg:LIGHT_GREY},{t:"Handlers signaux fatals",w:2400,bg:LIGHT_GREY},{t:"SIGSEGV/SIGABRT/SIGTERM/SIGINT/SIGBUS/SIGFPE/SIGILL -> zeroiser P3 + _exit(1) signal-safe.",w:5626,bg:LIGHT_GREY}]),
              row([{t:"FR8.5",w:1000},{t:"Arret d'urgence",w:2400},{t:"emergency_shutdown() : zero_all_fragments() + _exit(99) sans destructeurs C++.",w:5626}]),
              row([{t:"FR8.6",w:1000,bg:LIGHT_GREY},{t:"Filtrage syscalls (seccomp BPF)",w:2400,bg:LIGHT_GREY},{t:"Whitelist BPF : seuls les syscalls HSM necessaires autorises. Tout autre = SIGKILL.",w:5626,bg:LIGHT_GREY}]),
            ]),

            h2("2.8 Interface PKCS#11 — ABI C Exporte (FR9)"),
            p("pkcs11_payment.cpp exporte depuis libsofthsm2.so (__attribute__((visibility(\"default\")))). Partage du processus : LMK fragmentee et defenses identiques pour tous les clients (Python ctypes, banking apps, pkcs11-tool)."),
            tbl([3200,5826],[
              row([{t:"Fonction exportee",w:3200,bg:DARK_BLUE},{t:"Role",w:5826,bg:DARK_BLUE}],true),
              row([{t:"PayHSM_is_ready()",w:3200},{t:"Verifie que la fragmentation LMK est active (1=pret)",w:5826}]),
              row([{t:"PayHSM_PIN_translate(pin_block_in, pan, tpk, zpk, out)",w:3200,bg:LIGHT_GREY},{t:"Translation PIN Block TPK -> ZPK",w:5826,bg:LIGHT_GREY}]),
              row([{t:"PayHSM_ARQC_verify(sk_ac, tx_data, tx_len, arqc)",w:3200},{t:"Verification ARQC sous SK-AC",w:5826}]),
              row([{t:"PayHSM_MAC_calculate(msg, msg_len, tak, mac_out)",w:3200,bg:LIGHT_GREY},{t:"Retail MAC ISO 9797-1 Algo 3 sous TAK",w:5826,bg:LIGHT_GREY}]),
              row([{t:"PayHSM_EMV_derive_sk_ac(mk_ac, atc, sk_ac_out)",w:3200},{t:"Derivation SK-AC depuis MK-AC + ATC",w:5826}]),
              row([{t:"PayHSM_EMV_compute_arqc(sk_ac, tx_data, tx_len, arqc_out)",w:3200,bg:LIGHT_GREY},{t:"Calcul ARQC (simulation cote puce, demo end-to-end)",w:5826,bg:LIGHT_GREY}]),
              row([{t:"PayHSM_version()",w:3200},{t:"Retourne la chaine de version de l'extension PayHSM",w:5826}]),

            h3("anti_dump_setup()"),
            bp("setrlimit(RLIMIT_CORE,{0,0}) : empeche la creation de core dumps contenant les fragments LMK"),
            bp("mlockall(MCL_CURRENT|MCL_FUTURE) : verrouille toutes les pages memoire en RAM (pas de swap)"),
            bp("sigaction sur 7 signaux fatals — handler zeroIse P3 (.data) + _exit(1) signal-safe"),

            bp("prctl(PR_SET_DUMPABLE,0) + prctl(PR_SET_NO_NEW_PRIVS,1) — ptrace bloque des le demarrage"),

            bp("seccomp BPF whitelist : tout syscall hors liste autorisee declenche SIGKILL du noyau"),

            h2("5.2 xor_fragment.c — Fragmentation LMK"),
            p("La LMK (32 octets) est divisee en P1 (segment BSS, zero-init au boot), P2 (heap malloc, adresse variable), P3 (segment DATA, accessible par defense.c). L'invariant P1 XOR P2 XOR P3 = LMK est maintenu en permanence. La dispersion dans 3 segments distincts oblige un attaquant a analyser l'espace memoire entier pour reconstruire la cle. La fragmentation seule n'est pas un chiffrement mais augmente considerablement la complexite forensique."),

            h2("5.3 integrity.c / mutation.c — Integrite et Anti-Forensique"),
            p("integrity.c calcule HMAC-SHA256(lmk) comme reference lors de la fragmentation initiale. Avant chaque recompose_for_op(), verifie HMAC(P1 XOR P2 XOR P3) contre la reference. Echec = emergency_shutdown() immediate."),
            p("mutation.c applique XOR aleatoire (RAND_bytes) sur P1 et P3, realloue P2 sur nouvelle adresse heap. Le HMAC est recalcule et verifie apres mutation. Statistiques (count, last_ts) exposees au dashboard."),

            h2("5.4 lmk_store.c / kek_provider.c — Persistance"),
            p("Format lmk.bin : sel(16o) | nonce_GCM(12o) | tag_GCM(16o) | ciphertext(32o). KEK = PBKDF2-SHA256(passphrase, sel, 100000). AES-256-GCM garantit confidentialite ET integrite — toute modification du fichier est detectee au dechiffrement par echec du tag."),

            h2("5.5 key_vault.c — Coffre des Cles"),
            p("payhsm_key_vault_t : tableau 32 entrees payhsm_key_entry_t. Chaque entree : id(48 chars), type (enum 8 valeurs : LMK/TMK/TPK/TAK/ZMK/ZPK/PVK/IMK), terminal_id(32 chars), enc[16] (chiffre sous LMK AES-ECB), kcv[3]. API : vault_find(type, terminal_id), vault_find_by_id(id), vault_save(), vault_load(). La LMK est recomposee brievement pour chiffrer/dechiffrer les entrees."),

            h2("5.6 pin.c — ISO 9564 Format 0"),
            p("PIN Block = (0x0N PIN_digits 0xF...) XOR (0x0000 PAN_12digits). Chiffrement AES-128-ECB sous TPK. Translation TPK->ZPK : dechiffre sous TPK, extrait PIN, reconstruit bloc clair, rechiffre sous ZPK. PIN jamais en clair hors buffers proteges. PVV VISA = decimalise(AES(PVK, PAN+PSN+PIN))[0:4]."),

            h2("5.7 mac.c — ISO 9797-1 Algorithme 3"),
            p("Retail MAC : CBC-MAC sur tous les blocs du message, puis AES sur le dernier bloc sous TAK. Verification a temps constant (boucle XOR sans court-circuit) pour prevenir les attaques temporelles. Le calcul ZAK fonctionne identiquement avec la cle ZAK."),

            h2("5.8 emv.c — EMV Book 2 Methode A"),
            p("MK-AC = HMAC-SHA1(IMK, PAN||PSN)[0:16]. SK-AC = XOR(MK-AC, ATC padde 16o). ARQC = CMAC-AES(SK-AC, donnees_tx). ARPC = CMAC-AES(MK-AC, ARQC XOR ARC). payhsm_emv_simulate_purchase() orchestre tout en un appel, secure_zero() sur chaque secret des qu'il n'est plus utile."),

            h2("5.9 key_exchange.c — Hierarchie des Cles"),
            p("TPK = AES-CMAC(TMK, terminal_id||'TPK'). TAK = AES-CMAC(TMK, terminal_id||'TAK'). ZPK chiffre sous ZMK (AES-ECB) pour transport inter-bancaire. KCV = AES-ECB(key, 0x00...)[0:3] pour verification visuelle de toute cle."),

            h2("5.10 pkcs11_payment.cpp — ABI C PKCS#11"),
            p("Wrapper C++ avec extern \"C\" + __attribute__((visibility(\"default\"))). Deux raisons d'un ABI C : (1) ajouter des CKM_VENDOR_ dans SoftHSMv2 necessite de modifier plusieurs tables — hors scope PFE ; (2) l'ABI C est trivial a appeler depuis Python via ctypes pour le front-end de demonstration. Partage du processus : LMK fragmentee et defenses actives pour tous les clients."),

              row([{t:"PVV",w:1800},{t:"PIN Verification Value — 4 chiffres stockes dans le HSM emetteur, permet de verifier le PIN sans le stocker.",w:7226}]),
              row([{t:"SK-AC",w:1800,bg:LIGHT_GREY},{t:"Session Key Application Cryptogram = f(MK-AC, ATC) — cle de session unique par transaction EMV.",w:7226,bg:LIGHT_GREY}]),
              row([{t:"TAK",w:1800},{t:"Terminal Authentication Key — cle de terminal pour le calcul de MAC (authentification messages).",w:7226}]),
              row([{t:"TMK",w:1800,bg:LIGHT_GREY},{t:"Terminal Master Key — cle maitresse d'un terminal, utilisee pour deriver TPK et TAK.",w:7226,bg:LIGHT_GREY}]),
              row([{t:"TPK",w:1800},{t:"Terminal PIN Key — cle de terminal pour le chiffrement du PIN Block (transport securise du PIN).",w:7226}]),
              row([{t:"ZAK",w:1800,bg:LIGHT_GREY},{t:"Zone Authentication Key — cle inter-bancaire pour les MAC de compensation.",w:7226,bg:LIGHT_GREY}]),
              row([{t:"ZMK",w:1800},{t:"Zone Master Key — cle inter-bancaire utilisee pour l'echange securise de ZPK entre banques.",w:7226}]),
              row([{t:"ZPK",w:1800,bg:LIGHT_GREY},{t:"Zone PIN Key — cle inter-bancaire pour le transport des PIN Blocks entre banques (reseau).",w:7226,bg:LIGHT_GREY}]),
            ]),

            new Paragraph({ children:[new PageBreak()] }),
            new Paragraph({
              alignment: AlignmentType.CENTER,
              spacing: { before:2000 },
              children:[new TextRun({text:"--- Fin du Document ---",font:"Arial",size:20,color:"888888",italics:true})],
            }),
            new Paragraph({
              alignment: AlignmentType.CENTER,
              children:[new TextRun({text:"PayHSM PFE 2026 | Analyse de Conception | Confidentiel",font:"Arial",size:18,color:"AAAAAA"})],
            }),
          ],
        },
      ],
    });

    setStatus('Finalisation du fichier Word...');
    const blob = await Packer.toBlob(document);
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
      href: url,
      download: 'PayHSM_Analyse_Conception.docx',
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 5000);

    setStatus('Telechargement lance ! Verifiez votre dossier Telechargements.', 'ok');
    btn.disabled = false;
    btn.textContent = 'Regenerer le DOCX';

  } catch(e) {
    setStatus('Erreur : ' + e.message, 'err');
    console.error(e);
    btn.disabled = false;
  }
}

window.addEventListener('load', () => {
  if (typeof docx === 'undefined') {
    setStatus('Erreur : librairie docx non chargee. Verifiez votre connexion internet.', 'err');
    document.getElementById('btn').disabled = true;
  }
});
</script>
